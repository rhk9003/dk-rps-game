<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DK 府中店 - 猜拳拿好禮</title>
    <style>
        /* ===================================================================
           DESIGN SYSTEM — 長輩友善 × 活動氛圍
           主色：溫暖紅 #e41e07、金黃 #1198cd、奶油白 #ece0d8
           副色：森綠 #1198cd、深棕 #2D3142
           =================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', 'PingFang TC', sans-serif;
            background: #ece0d8;
            color: #2D3142;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .screen {
            display: none;
            width: 100%; height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0;
            padding: 15px;
            overflow-y: auto;
        }
        .screen.active { display: flex; }

        /* ============ Decorative background elements ============ */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            z-index: 0;
        }

        /* ===== SCREEN 1: WELCOME ===== */
        #welcome {
            background:
                radial-gradient(circle at 10% 20%, rgba(17,152,205,0.35) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(228,30,7,0.25) 0%, transparent 45%),
                linear-gradient(135deg, #ece0d8 0%, #dbcfc0 100%);
            text-align: center;
        }
        .welcome-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .welcome-badge {
            background: linear-gradient(135deg, #e41e07, #940201);
            border-radius: 50px;
            padding: 14px 42px;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(228,30,7,0.35), inset 0 -3px 0 rgba(0,0,0,0.15);
        }
        .welcome-lead {
            display: flex;
            gap: 14px;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            font-size: 26px;
            font-weight: 900;
            color: #940201;
            letter-spacing: 2px;
        }
        .welcome-lead .hand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 58px;
            height: 58px;
            font-size: 36px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid #940201;
            box-shadow: 0 4px 0 #940201;
            animation: handBounce 1.8s infinite ease-in-out;
        }
        .welcome-lead .hand.h2 { animation-delay: 0.2s; border-color: #e41e07; box-shadow: 0 4px 0 #e41e07; }
        .welcome-lead .hand.h3 { animation-delay: 0.4s; border-color: #1198cd; box-shadow: 0 4px 0 #1198cd; }
        @keyframes handBounce {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }
        .welcome-title {
            position: relative;
            font-size: 82px;
            font-weight: 900;
            color: #e41e07;
            margin-bottom: 38px;
            letter-spacing: 4px;
            line-height: 1;
            animation: titleBounce 2s infinite ease-in-out;
            display: inline-block;
            padding: 10px 24px;
            background: #fff;
            border: 4px solid #940201;
            border-radius: 16px;
            box-shadow: 0 6px 0 #940201;
        }
        .welcome-title::before {
            content: '✨';
            position: absolute;
            top: -22px; right: -18px;
            font-size: 42px;
            animation: sparkle 1.4s infinite;
        }
        .welcome-title::after {
            content: '✨';
            position: absolute;
            bottom: -6px; left: -22px;
            font-size: 36px;
            animation: sparkle 1.4s infinite 0.7s;
        }
        @keyframes titleBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        @keyframes sparkle {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.4) rotate(180deg); opacity: 0.7; }
        }
        .welcome-sub {
            display: inline-block;
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(135deg, #1198cd, #0a6d85);
            padding: 8px 38px;
            border-radius: 50px;
            letter-spacing: 8px;
            border: 3px solid #fff;
            box-shadow: 0 4px 0 #083c49, 0 0 0 2px #1198cd;
            margin-bottom: 28px;
            position: relative;
        }
        .welcome-desc {
            font-size: 26px;
            color: #2D3142;
            margin-bottom: 35px;
            line-height: 1.8;
            font-weight: 700;
        }
        .welcome-desc .highlight {
            color: #fff;
            font-weight: 900;
            background: #e41e07;
            padding: 2px 15px;
            border-radius: 10px;
        }
        .welcome-prizes {
            display: flex;
            gap: 14px;
            margin-bottom: 45px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 750px;
        }
        .prize-tag {
            background: #fff;
            border: 3px solid #2D3142;
            border-radius: 16px;
            padding: 14px 24px;
            font-size: 22px;
            font-weight: 800;
            color: #2D3142;
            box-shadow: 4px 4px 0 #2D3142;
        }
        .prize-tag span {
            color: #e41e07;
            font-weight: 900;
        }
        .btn-start {
            background: linear-gradient(135deg, #e41e07, #940201);
            border: none;
            color: #fff;
            font-size: 42px;
            font-weight: 900;
            padding: 28px 90px;
            border-radius: 80px;
            cursor: pointer;
            box-shadow: 0 10px 0 #530101, 0 15px 30px rgba(230,57,70,0.4);
            animation: pulse 1.5s infinite;
            letter-spacing: 6px;
            border: 4px solid #fff;
        }
        .btn-start:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #530101, 0 8px 15px rgba(230,57,70,0.4);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        /* ===== SCREEN 2: PHONE ===== */
        #phone-screen {
            background:
                radial-gradient(circle at 100% 0%, #b8dff0 0%, transparent 35%),
                radial-gradient(circle at 0% 100%, #b8dff0 0%, transparent 35%),
                linear-gradient(135deg, #ece0d8 0%, #dbcfc0 100%);
            padding: 12px;
            justify-content: flex-start;
            padding-top: 20px;
        }
        .phone-title {
            font-size: 30px;
            font-weight: 900;
            color: #2D3142;
            margin-bottom: 6px;
        }
        .phone-hint {
            font-size: 15px;
            color: #e41e07;
            margin-bottom: 12px;
            font-weight: 800;
            background: #FFF;
            padding: 5px 16px;
            border-radius: 30px;
            border: 2px dashed #e41e07;
        }
        .phone-display {
            background: #fff;
            border: 3px solid #2D3142;
            border-radius: 14px;
            padding: 12px 20px;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 3px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            margin-bottom: 8px;
            min-height: 58px;
            color: #e41e07;
            box-shadow: 4px 4px 0 #2D3142;
        }
        .phone-display.empty {
            color: #B0B0B0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .phone-display.error {
            border-color: #e41e07;
            background: #FFE0E0;
            animation: shake 0.5s;
        }
        .phone-error-msg {
            color: #e41e07;
            font-size: 15px;
            font-weight: 800;
            min-height: 20px;
            margin-bottom: 8px;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px;
            width: 90%;
            max-width: 340px;
        }
        .numpad-btn {
            aspect-ratio: 1.4 / 1;
            min-height: 55px;
            font-size: 28px;
            font-weight: 900;
            border: 3px solid #2D3142;
            border-radius: 14px;
            background: #fff;
            color: #2D3142;
            cursor: pointer;
            transition: all 0.08s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0 #2D3142;
        }
        .numpad-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0 0 0 #2D3142;
        }
        .numpad-btn.zero {
            grid-column: 2;
        }
        .fn-btn-clear {
            grid-column: 1;
            background: #1198cd !important;
            color: #fff !important;
            font-size: 18px !important;
        }
        .fn-btn-back {
            grid-column: 3;
            background: #e41e07 !important;
            color: #fff !important;
            font-size: 24px !important;
        }

        .btn-phone-submit {
            background: linear-gradient(135deg, #1198cd, #0a6d85);
            border: 3px solid #fff;
            color: #fff;
            font-size: 22px;
            font-weight: 900;
            padding: 14px 50px;
            border-radius: 50px;
            cursor: pointer;
            min-width: 220px;
            box-shadow: 0 6px 0 #083c49, 0 10px 15px rgba(6,167,125,0.3);
            letter-spacing: 3px;
        }
        .btn-phone-submit:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #083c49;
        }
        .btn-phone-submit:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            background: #CCC;
            box-shadow: 0 6px 0 #999;
            border-color: #EEE;
        }

        /* ===== SCREEN 3: RPS ===== */
        #rps-screen {
            background:
                radial-gradient(circle at 0% 0%, #b8dff0 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, #f3a89c 0%, transparent 40%),
                linear-gradient(135deg, #ece0d8 0%, #dbcfc0 100%);
        }
        .rps-header-bar {
            width: 100%;
            max-width: 700px;
            background: linear-gradient(135deg, #e41e07, #940201);
            border-radius: 24px;
            padding: 18px 30px;
            text-align: center;
            margin-bottom: 22px;
            border: 4px solid #fff;
            box-shadow: 6px 6px 0 #2D3142;
        }
        .rps-header-title {
            font-size: 36px;
            font-weight: 900;
            color: #FFF;
            margin-bottom: 4px;
            letter-spacing: 3px;
        }
        .rps-header-sub {
            font-size: 20px;
            color: #ece0d8;
            font-weight: 800;
        }

        .rps-score-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }
        .score-box {
            background: #fff;
            border-radius: 22px;
            padding: 14px 36px;
            text-align: center;
            min-width: 140px;
            border: 4px solid #2D3142;
            box-shadow: 5px 5px 0 #2D3142;
        }
        .score-box.player { border-color: #1198cd; box-shadow: 5px 5px 0 #1198cd; }
        .score-box.cpu { border-color: #e41e07; box-shadow: 5px 5px 0 #e41e07; }
        .score-label {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 5px;
            color: #2D3142;
        }
        .score-value {
            font-size: 64px;
            font-weight: 900;
            line-height: 1;
            color: #2D3142;
        }
        .score-box.player .score-value { color: #1198cd; }
        .score-box.cpu .score-value { color: #e41e07; }
        .score-vs {
            font-size: 38px;
            font-weight: 900;
            color: #2D3142;
        }

        .rps-prize-info {
            display: flex;
            gap: 18px;
            margin-bottom: 22px;
            width: 100%;
            max-width: 700px;
        }
        .prize-panel {
            flex: 1;
            border-radius: 18px;
            padding: 14px 20px;
            text-align: center;
            background: #fff;
            border: 3px solid #2D3142;
        }
        .prize-panel.win {
            border-color: #e41e07;
            background: #fdecea;
        }
        .prize-panel.lose {
            border-color: #1198cd;
            background: #e8f2f7;
        }
        .prize-panel-title {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .prize-panel.win .prize-panel-title { color: #e41e07; }
        .prize-panel.lose .prize-panel-title { color: #1198cd; }
        .prize-panel-items {
            font-size: 16px;
            color: #2D3142;
            line-height: 1.6;
            font-weight: 700;
        }

        .rps-instruction {
            font-size: 28px;
            font-weight: 900;
            color: #e41e07;
            margin-bottom: 18px;
            padding: 12px 40px;
            background: #FFF;
            border-radius: 50px;
            border: 3px dashed #e41e07;
            animation: pulseText 1.5s infinite;
        }
        @keyframes pulseText {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .rps-choices {
            display: flex;
            gap: 25px;
        }
        .rps-btn {
            width: 165px;
            height: 180px;
            border: 5px solid #2D3142;
            border-radius: 26px;
            background: #fff;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            box-shadow: 6px 6px 0 #2D3142;
        }
        .rps-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0 0 0 #2D3142;
            background: #ece0d8;
            border-color: #e41e07;
        }
        .rps-btn-emoji { font-size: 82px; line-height: 1; }
        .rps-btn-text {
            font-size: 30px;
            font-weight: 900;
            color: #2D3142;
            margin-top: 8px;
        }
        .rps-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ===== OVERLAY: Round Result (蓋板畫面) ===== */
        .round-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(148,2,1,0.96), rgba(228,30,7,0.92));
            z-index: 500;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: overlayIn 0.3s ease-out;
        }
        .round-overlay.active { display: flex; }
        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .overlay-hands {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 35px;
        }
        .overlay-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .overlay-side-label {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            padding: 6px 24px;
            border-radius: 30px;
            letter-spacing: 4px;
            border: 3px solid #fff;
        }
        .overlay-side.player .overlay-side-label { background: #1198cd; }
        .overlay-side.cpu .overlay-side-label { background: #940201; }
        .overlay-hand {
            font-size: 140px;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFF;
            border-radius: 35px;
            border: 6px solid #1198cd;
            box-shadow: 0 10px 0 #0a6d85;
            line-height: 1;
        }
        .overlay-side.player .overlay-hand { border-color: #1198cd; box-shadow: 0 10px 0 #0a6d85; }
        .overlay-side.cpu .overlay-hand { border-color: #940201; box-shadow: 0 10px 0 #530101; }
        .overlay-vs {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
        }
        .overlay-result-label {
            font-size: 38px;
            font-weight: 900;
            color: #FFF;
            margin-bottom: 15px;
            letter-spacing: 4px;
        }
        .overlay-result-text {
            font-size: 76px;
            font-weight: 900;
            margin-bottom: 18px;
            letter-spacing: 6px;
            line-height: 1.15;
            max-width: 95vw;
            text-align: center;
        }
        .overlay-result-text.win {
            color: #fff;
            background: #1198cd;
            padding: 10px 28px;
            border-radius: 18px;
            border: 4px solid #fff;
        }
        .overlay-result-text.lose {
            color: #fff;
            background: #940201;
            padding: 10px 28px;
            border-radius: 18px;
            border: 4px solid #fff;
        }
        .overlay-result-text.draw {
            color: #2D3142;
            background: #ece0d8;
            padding: 10px 28px;
            border-radius: 18px;
            border: 4px solid #fff;
        }
        .overlay-sub {
            font-size: 30px;
            color: #FFF;
            font-weight: 800;
            background: rgba(0,0,0,0.3);
            padding: 10px 30px;
            border-radius: 50px;
        }

        /* ===== SCREEN 4: WHEEL ===== */
        #wheel-screen {
            background:
                radial-gradient(circle at 20% 90%, #b8dff0 0%, transparent 40%),
                radial-gradient(circle at 80% 10%, #f3a89c 0%, transparent 40%),
                linear-gradient(135deg, #ece0d8 0%, #dbcfc0 100%);
        }
        .wheel-header-badge {
            background: linear-gradient(135deg, #1198cd, #0a6d85);
            color: #FFF;
            border-radius: 50px;
            padding: 14px 40px;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: 4px;
            border: 4px solid #FFF;
            box-shadow: 0 6px 0 #2D3142;
        }
        .wheel-title {
            font-size: 44px;
            font-weight: 900;
            margin-bottom: 8px;
            color: #2D3142;
        }
        .wheel-subtitle {
            font-size: 24px;
            color: #2D3142;
            margin-bottom: 25px;
            font-weight: 800;
            background: #FFF;
            padding: 8px 24px;
            border-radius: 30px;
            border: 2px dashed #e41e07;
        }
        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin-bottom: 28px;
        }
        .wheel-canvas {
            width: 400px;
            height: 400px;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
        }
        .wheel-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 54px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            z-index: 10;
            color: #e41e07;
        }
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e41e07, #940201);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 900;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3), inset 0 -4px 0 rgba(0,0,0,0.2);
            z-index: 10;
            color: #FFF;
            border: 4px solid #FFF;
        }
        .btn-spin {
            background: linear-gradient(135deg, #e41e07, #940201);
            border: 4px solid #FFF;
            color: #FFF;
            font-size: 36px;
            font-weight: 900;
            padding: 24px 80px;
            border-radius: 70px;
            cursor: pointer;
            box-shadow: 0 10px 0 #530101, 0 15px 25px rgba(0,0,0,0.25);
            animation: pulse 1.5s infinite;
            letter-spacing: 6px;
        }
        .btn-spin:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #530101;
        }
        .btn-spin:disabled {
            opacity: 0.5;
            animation: none;
            cursor: not-allowed;
            background: #AAA;
            box-shadow: 0 6px 0 #666;
        }

        /* ===== SCREEN 5: RESULT ===== */
        #result-screen {
            background:
                radial-gradient(circle at 50% 0%, #b8dff0 0%, transparent 40%),
                radial-gradient(circle at 50% 100%, #f3a89c 0%, transparent 40%),
                linear-gradient(135deg, #ece0d8 0%, #dbcfc0 100%);
            text-align: center;
        }
        .result-congrats {
            font-size: 52px;
            font-weight: 900;
            margin-bottom: 10px;
            color: #2D3142;
        }
        .result-prize-name {
            font-size: 38px;
            font-weight: 900;
            color: #FFF;
            background: linear-gradient(135deg, #e41e07, #940201);
            padding: 16px 32px;
            border-radius: 20px;
            border: 4px solid #FFF;
            box-shadow: 6px 6px 0 #2D3142;
            margin-bottom: 28px;
            letter-spacing: 2px;
            max-width: 92vw;
            text-align: center;
            line-height: 1.3;
        }
        .result-qr-box {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 22px;
            border: 5px solid #2D3142;
            box-shadow: 8px 8px 0 #2D3142;
        }
        .result-qr-box canvas {
            display: block;
        }
        .result-scan-hint {
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 8px;
            color: #1198cd;
        }
        .result-scan-sub {
            font-size: 20px;
            color: #2D3142;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .result-tomorrow {
            font-size: 22px;
            font-weight: 900;
            color: #FFF;
            background: linear-gradient(135deg, #1198cd, #0a6d85);
            padding: 10px 28px;
            border-radius: 40px;
            border: 3px solid #FFF;
            box-shadow: 0 4px 0 #2D3142;
            margin-bottom: 18px;
            letter-spacing: 2px;
        }
        .btn-back-home {
            background: #2D3142;
            color: #FFF;
            border: 3px solid #FFF;
            padding: 12px 32px;

        /* ===================================================================

</head>
<body>

</div>

<script>
// ===================================================================
//  CONFIG
// ===================================================================
// 🏆 贏家獎池（機率合計 100%，375 場）
const WIN_PRIZES = [
    { wheel: '動態\n釋壓鞋',  name: 'DK 動態釋壓鞋 $1,280',   color: '#940201', prob: 8 },
    { wheel: '五趾\n隱形襪',  name: 'DK 五趾隱形襪 $250',     color: '#1198cd', prob: 25 },
    { wheel: '$500\n抵用金',  name: 'LINE $500 官網抵用金',   color: '#e41e07', prob: 20 },
    { wheel: '7 折券',         name: 'LINE 門市 7 折券',        color: '#0a6d85', prob: 25 },
    { wheel: '$500\n折價券',  name: 'LINE 門市 $500 折價券',   color: '#340101', prob: 22 },
];
// 🎁 輸家 / 參加獎池（機率合計 100%，375 場）
const LOSE_PRIZES = [
    { wheel: '石墨烯\n袖套 🎊', name: 'A0003 石墨烯袖套 $680（隱藏）', color: '#340101', prob: 2.5 },
    { wheel: '涼感\n底紗襪',   name: 'DK 涼感底紗襪 $180',     color: '#1198cd', prob: 20 },
    { wheel: '$50\n抵用金',    name: 'LINE $50 官網抵用金',    color: '#e41e07', prob: 20 },
    { wheel: '8 折券',          name: 'LINE 門市 8 折券',        color: '#0a6d85', prob: 27.5 },
    { wheel: '$100\n折價券',   name: 'LINE 門市 $100 折價券',   color: '#940201', prob: 30 },
];
const GAS_URL = '';
const LINE_QR_URL = 'https://line.me/R/ti/p/@dk-shoes';
const RESULT_DISPLAY_SEC = 30;
const COOLDOWN_SEC = 10;

// ===================================================================
//  STATE
// ===================================================================
let phoneNumber = '';
let playerWins = 0;
let cpuWins = 0;
let roundNumber = 1;
let isRpsLocked = false;
let isGameWon = false;

const RPS_EMOJI = { rock: '✊', scissors: '✌️', paper: '🖐️' };

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ===================================================================
//  PHONE
// ===================================================================
function phoneInput(digit) {
    if (phoneNumber.length >= 10) return;
    phoneNumber += digit;
    updatePhoneDisplay();
}
function phoneBackspace() {
    phoneNumber = phoneNumber.slice(0, -1);
    updatePhoneDisplay();
}
function phoneClear() {
    phoneNumber = '';
    updatePhoneDisplay();
}
function updatePhoneDisplay() {
    const display = document.getElementById('phoneDisplay');
    if (phoneNumber.length === 0) {
        display.textContent = '請輸入 10 碼';
        display.classList.add('empty');
    } else {
        display.classList.remove('empty');
        let formatted = phoneNumber;
        if (phoneNumber.length > 4) {
            formatted = phoneNumber.slice(0,4) + '-' + phoneNumber.slice(4);
        }
        if (phoneNumber.length > 7) {
            formatted = phoneNumber.slice(0,4) + '-' + phoneNumber.slice(4,7) + '-' + phoneNumber.slice(7);
        }
        display.textContent = formatted;
    }
    display.classList.remove('error');
    document.getElementById('phoneError').textContent = '';
    document.getElementById('phoneSubmitBtn').disabled = phoneNumber.length !== 10;
}

async function submitPhone() {
    if (phoneNumber.length !== 10 || !phoneNumber.startsWith('09')) {
        document.getElementById('phoneDisplay').classList.add('error');
        document.getElementById('phoneError').textContent = '請輸入正確的手機號碼（09 開頭）';
        return;
    }
    if (GAS_URL) {
        showLoading(true);
        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'check', phone: phoneNumber })
            });
        } catch(e) { console.log('demo mode'); }
        showLoading(false);
    }
    resetRPS();
    showScreen('rps-screen');
}

function showLoading(show) {
    document.getElementById('loading').classList.toggle('active', show);
}

// ===================================================================
//  RPS GAME
// ===================================================================
function resetRPS() {
    playerWins = 0;
    cpuWins = 0;
    roundNumber = 1;
    isRpsLocked = false;
    document.getElementById('playerScore').textContent = '0';
    document.getElementById('cpuScore').textContent = '0';
    document.getElementById('rpsRoundTitle').textContent = `第 1 局`;
    setRpsButtons(true);
}

function setRpsButtons(enabled) {
    document.querySelectorAll('.rps-btn').forEach(b => b.disabled = !enabled);
}

function playRPS(playerChoice) {
    if (isRpsLocked) return;
    isRpsLocked = true;
    setRpsButtons(false);

    const choices = ['rock', 'scissors', 'paper'];
    const cpuChoice = choices[Math.floor(Math.random() * 3)];
    const result = getRPSResult(playerChoice, cpuChoice);
    showRoundOverlay(playerChoice, cpuChoice, result);
}

function showRoundOverlay(playerChoice, cpuChoice, result) {
    const overlay = document.getElementById('roundOverlay');
    const playerHandEl = document.getElementById('overlayPlayerHand');
    const cpuHandEl = document.getElementById('overlayCpuHand');
    const labelEl = document.getElementById('overlayResultLabel');
    const resultTextEl = document.getElementById('overlayResultText');
    const subEl = document.getElementById('overlaySub');

    playerHandEl.textContent = '✊';
    cpuHandEl.textContent = '✊';
    labelEl.textContent = '剪刀、石頭、布！';
    resultTextEl.textContent = '';
    resultTextEl.className = 'overlay-result-text';
    subEl.textContent = '';

    // Add shake animation class to cpu hand
    cpuHandEl.style.transition = 'transform 0.08s';

    overlay.classList.add('active');

    // Player reveals immediately (玩家已選好)
    setTimeout(() => {
        playerHandEl.textContent = RPS_EMOJI[playerChoice];
        playerHandEl.style.transform = 'scale(1.1)';
        setTimeout(() => { playerHandEl.style.transform = 'scale(1)'; }, 200);
    }, 400);

    // CPU 隨機切換拳頭動畫 (1.5秒)
    const rpsKeys = ['rock', 'scissors', 'paper'];
    let shuffleCount = 0;
    const shuffleInterval = setInterval(() => {
        const randomKey = rpsKeys[Math.floor(Math.random() * 3)];
        cpuHandEl.textContent = RPS_EMOJI[randomKey];
        // Shake effect
        const angle = (Math.random() - 0.5) * 30;
        const scale = 0.9 + Math.random() * 0.2;
        cpuHandEl.style.transform = `rotate(${angle}deg) scale(${scale})`;
        shuffleCount++;
    }, 90);

    // 揭曉電腦的拳 (1.6秒後停止)
    setTimeout(() => {
        clearInterval(shuffleInterval);
        cpuHandEl.textContent = RPS_EMOJI[cpuChoice];
        // Bouncy landing
        cpuHandEl.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
        cpuHandEl.style.transform = 'rotate(0deg) scale(1.25)';
        setTimeout(() => {
            cpuHandEl.style.transform = 'rotate(0deg) scale(1)';
        }, 300);
    }, 1600);

    // Show result
    setTimeout(() => {
        let finalText;
        if (result === 'win') {
            playerWins++;
            finalText = '恭喜，你贏了';
            resultTextEl.className = 'overlay-result-text win';
            labelEl.textContent = `第 ${roundNumber} 局`;
        } else if (result === 'lose') {
            cpuWins++;
            finalText = '😢 哎呀!! 你輸了';
            resultTextEl.className = 'overlay-result-text lose';
            labelEl.textContent = `第 ${roundNumber} 局`;
        } else {
            finalText = '平手';
            resultTextEl.className = 'overlay-result-text draw';
            labelEl.textContent = `第 ${roundNumber} 局`;
        }
        resultTextEl.textContent = finalText;
        document.getElementById('playerScore').textContent = playerWins;
        document.getElementById('cpuScore').textContent = cpuWins;

        if (playerWins >= 2 || cpuWins >= 2) {
            isGameWon = playerWins >= 2;
            subEl.textContent = isGameWon ? '哇!! 好厲害　快來轉大獎輪盤' : '今天手氣差了一點點!!　請轉轉再加油輪盤吧';
            setTimeout(() => {
                overlay.classList.remove('active');
                goToWheel();
            }, 2200);
        } else {
            const nextRound = (result === 'draw') ? roundNumber : roundNumber + 1;
            subEl.textContent = `比數 ${playerWins} : ${cpuWins}　準備第 ${nextRound} 局`;
            setTimeout(() => {
                overlay.classList.remove('active');
                if (result !== 'draw') roundNumber++;
                document.getElementById('rpsRoundTitle').textContent = `第 ${roundNumber} 局`;
                isRpsLocked = false;
                setRpsButtons(true);
            }, 2200);
        }
    }, 2100);  // 等電腦揭曉動畫結束（1600ms shuffle + 300ms bounce + 200ms pause）再顯示結果
}

function getRPSResult(player, cpu) {
    if (player === cpu) return 'draw';
    if (
        (player === 'rock' && cpu === 'scissors') ||
        (player === 'scissors' && cpu === 'paper') ||
        (player === 'paper' && cpu === 'rock')
    ) return 'win';
    return 'lose';
}

// ===================================================================
//  WHEEL
// ===================================================================
let wheelRotation = 0;
let wheelSpinning = false;
let currentPrizes = [];

function goToWheel() {
    currentPrizes = isGameWon ? WIN_PRIZES : LOSE_PRIZES;
    document.getElementById('wheelBadge').textContent = isGameWon ? '🏆 大獎輪盤' : '🎁 安慰輪盤';
    document.getElementById('wheelTitle').textContent = isGameWon ? '恭喜獲勝！' : '別氣餒！';
    document.getElementById('wheelSubtitle').textContent = isGameWon ? '大獎等著你 → 按下按鈕轉動' : '通通有獎 → 按下按鈕轉動';
    wheelRotation = 0;
    drawWheel(currentPrizes);
    document.getElementById('spinBtn').disabled = false;
    showScreen('wheel-screen');
}

function drawWheel(prizes) {
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = 190;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((wheelRotation * Math.PI) / 180);

    const total = prizes.length;
    const arc = (2 * Math.PI) / total;

    prizes.forEach((prize, i) => {
        const startAngle = i * arc - Math.PI / 2;
        const endAngle = startAngle + arc;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = prize.color;
        ctx.fill();
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.save();
        ctx.rotate(startAngle + arc / 2);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 17px "Microsoft JhengHei"';
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 4;

        const label = prize.wheel || prize.name;
        const lines = label.split('\n');
        const lineHeight = 20;
        const startY = -((lines.length - 1) / 2) * lineHeight;
        lines.forEach((line, i) => {
            ctx.fillText(line, r * 0.62, startY + i * lineHeight + 6);
        });
        ctx.restore();
    });

    // Outer ring
    ctx.beginPath();
    ctx.arc(0, 0, r + 8, 0, 2 * Math.PI);
    ctx.strokeStyle = '#2D3142';
    ctx.lineWidth = 8;
    ctx.stroke();

    ctx.restore();
}

function spinWheel() {
    if (wheelSpinning) return;
    wheelSpinning = true;
    document.getElementById('spinBtn').disabled = true;

    const prizes = currentPrizes;
    const totalProb = prizes.reduce((s, p) => s + p.prob, 0);
    let rand = Math.random() * totalProb;
    let winIndex = 0;
    for (let i = 0; i < prizes.length; i++) {
        rand -= prizes[i].prob;
        if (rand <= 0) { winIndex = i; break; }
    }

    const sliceAngle = 360 / prizes.length;
    const targetSliceCenter = winIndex * sliceAngle;
    const targetAngle = 360 - targetSliceCenter;
    const extraSpins = 5 * 360;
    const randomOffset = (Math.random() - 0.5) * (sliceAngle * 0.6);
    const totalSpin = extraSpins + targetAngle + randomOffset;

    const startRotation = wheelRotation;
    const duration = 4000;
    const startTime = performance.now();

    function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        wheelRotation = startRotation + totalSpin * ease;
        drawWheel(prizes);
        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            wheelSpinning = false;
            setTimeout(() => showResult(prizes[winIndex]), 500);
        }
    }
    requestAnimationFrame(animate);
}

// ===================================================================
//  RESULT
// ===================================================================
function showResult(prize) {
    document.getElementById('resultPrizeName').textContent = prize.name;
    drawQRPlaceholder(prize.name);
    recordGame(prize.name);
    fireConfetti();
    showScreen('result-screen');
    // 無倒數 - 等店員按下「回到首頁」再離開
}

function drawQRPlaceholder(prizeName) {
    const canvas = document.getElementById('qrCanvas');
    const ctx = canvas.getContext('2d');
    const size = 220;
    ctx.fillStyle = '#FFF';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#000';
    const modules = 21;
    const moduleSize = (size - 20) / modules;
    const offset = 10;
    const seed = prizeName.length * 7 + 42;
    for (let row = 0; row < modules; row++) {
        for (let col = 0; col < modules; col++) {
            const inTopLeft = row < 7 && col < 7;
            const inTopRight = row < 7 && col >= modules - 7;
            const inBottomLeft = row >= modules - 7 && col < 7;
            if (inTopLeft || inTopRight || inBottomLeft) {
                const lr = row % 7 < 1 || row % 7 > 5 || col % 7 < 1 || col % 7 > 5 ||
                           (row % 7 >= 2 && row % 7 <= 4 && col % 7 >= 2 && col % 7 <= 4);
                if (lr) ctx.fillRect(offset + col * moduleSize, offset + row * moduleSize, moduleSize, moduleSize);
            } else {
                const hash = ((row * 31 + col * 17 + seed) * 2654435761) >>> 0;
                if (hash % 3 !== 0) ctx.fillRect(offset + col * moduleSize, offset + row * moduleSize, moduleSize, moduleSize);
            }
        }
    }
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(size/2 - 50, size/2 - 13, 100, 26);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('DEMO QR', size/2, size/2 + 4);
}

async function recordGame(prizeName) {
    if (!GAS_URL) {
        console.log('Demo:', { phone: phoneNumber, result: isGameWon ? '勝' : '敗', prize: prizeName });
        return;
    }
    try {
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
                action: 'record', phone: phoneNumber,
                result: isGameWon ? '勝' : '敗', prize: prizeName,
                timestamp: new Date().toISOString()
            })
        });
    } catch(e) { console.error('Record failed:', e); }
}

function fireConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const colors = ['#e41e07', '#940201', '#1198cd', '#0a6d85', '#ece0d8', '#b8dff0'];
    for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 1 + 's';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.width = (10 + Math.random() * 10) + 'px';
        piece.style.height = (10 + Math.random() * 10) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 4000);
}

// ===================================================================
//  COOLDOWN
// ===================================================================
function startCooldown() {
    showScreen('cooldown-screen');
    let remaining = COOLDOWN_SEC;
    document.getElementById('cooldownNum').textContent = remaining;
    const timer = setInterval(() => {
        remaining--;
        document.getElementById('cooldownNum').textContent = remaining;
        if (remaining <= 0) {
            clearInterval(timer);
            resetAll();
        }
    }, 1000);
}

function resetAll() {
    phoneNumber = '';
    playerWins = 0;
    cpuWins = 0;
    roundNumber = 1;
    isRpsLocked = false;
    isGameWon = false;
    wheelRotation = 0;
    updatePhoneDisplay();
    showScreen('welcome');
}

drawWheel(WIN_PRIZES);
